<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CASHEW HOUSE BAKERY MENU</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <div class="language-switcher">
          <label for="languageSelect" data-i18n="languageLabel">Language</label>
          <select id="languageSelect" aria-label="language selector">
            <option value="en">English</option>
            <option value="ko">한국어</option>
            <option value="vi">Tiếng Việt</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
          </select>
        </div>
        <img class="hero__logo" src="images/hero-logo.png" alt="Cashew House logo" />
        <h1 data-i18n="heroTitle">Premium Cashew Dessert from Vietnam</h1>
        <p class="hero__desc" data-i18n="heroDesc1">베트남 프리미엄 캐슈넛으로 만든 수제 베이커리 &amp; 디저트</p>
        <a class="hero__button" href="#menuSection" data-i18n="menuViewButton"
          >메뉴 보기</a
        >
      </div>
    </header>

    <main class="container">
      <section id="menuSection" class="menu-section">
        <h2 class="section-title" data-i18n="menuCategoriesTitle">Menu Categories</h2>
        <div id="categoryTabs" class="tabs" role="tablist" aria-label="카테고리 탭"></div>
        <div id="menuGrid" class="menu-grid" aria-live="polite"></div>
      </section>

      <section class="order-section">
        <h2 class="section-title" data-i18n="orderTitle">주문 방법</h2>
        <p data-i18n="orderDesc1">카카오톡 / Zalo로 간편하게 주문 가능합니다</p>
        <p data-i18n="orderDesc2">매장 픽업 및 배달 모두 가능</p>

        <div class="action-group">
          <a class="action-button" href="#" aria-label="Zalo order button" data-i18n="zaloOrderButton">Zalo 주문하기</a>
          <a class="action-button" href="#" aria-label="KakaoTalk order button" data-i18n="kakaoOrderButton">KakaoTalk 주문하기</a>
        </div>

        <h3 class="sub-title" data-i18n="deliveryAppTitle">배달 어플 바로가기</h3>
        <div class="action-group">
          <a class="action-button action-button--sub" href="#" aria-label="Grab link button" data-i18n="grabButton">Grab 바로가기</a>
          <a class="action-button action-button--sub" href="#" aria-label="Delivery K link button" data-i18n="deliveryKButton">Delivery K 바로가기</a>
          <a class="action-button action-button--sub" href="#" aria-label="Capichi link button" data-i18n="capichiButton">Capichi 바로가기</a>
        </div>
      </section>

      <section class="store-section">
        <h2 class="section-title" data-i18n="storeTitle">Cashew House</h2>
        <p data-i18n="storeAddress">23 Tran Ngoc Dien, Thao Dien, HCMC</p>
        <p><strong data-i18n="businessHoursLabel">영업시간</strong><br />08:00 - 19:00</p>
      </section>
    </main>

    <template id="menuCardTemplate">
      <article class="menu-card">
        <div class="menu-card__image-wrap">
          <img class="menu-card__image" alt="" />
        </div>
        <div class="menu-card__body">
          <h3 class="menu-card__name"></h3>
          <p class="menu-card__description"></p>
          <div class="menu-card__flavors"></div>
          <p class="menu-card__price"></p>
          <div class="menu-card__allergy-row">
            <p class="menu-card__allergy"></p>
            <p class="menu-card__allergy"></p>
            <p class="menu-card__allergy"></p>
          </div>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
